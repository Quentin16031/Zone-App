// ── Utilitaires ──────────────────────────────────────────
function haversine(la1,lo1,la2,lo2){
  const R=6371000,d1=(la2-la1)*Math.PI/180,d2=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(d1/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(d2/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const fmtD=m=>m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(1)} km`;
const fmtDate=ts=>new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});

function uidHue(uid){
  const hs=["#D85A30","#7F77DD","#378ADD","#D4537E","#BA7517","#1D9E75","#5DCAA5","#993C1D"];
  const n=uid.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  return hs[n%hs.length];
}

function compressImg(file){
  return new Promise(ok=>{
    const r=new FileReader();
    r.onload=e=>{
      const i=new Image();
      i.onload=()=>{
        const MAX=520,sc=Math.min(1,MAX/Math.max(i.width,i.height));
        const c=document.createElement('canvas');
        c.width=Math.round(i.width*sc);c.height=Math.round(i.height*sc);
        c.getContext('2d').drawImage(i,0,0,c.width,c.height);
        ok(c.toDataURL('image/jpeg',0.55));
      };
      i.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function gpsToSvg(uLat,uLng,lat,lng,mpu){
  const dlat=(lat-uLat)*(Math.PI/180)*6371000;
  const dlng=(lng-uLng)*(Math.PI/180)*6371000*Math.cos(uLat*Math.PI/180);
  return{x:50+dlng/mpu,y:50-dlat/mpu};
}

const canSee=(p,uid,gps)=>p.uid===uid||(gps&&haversine(gps.lat,gps.lng,p.lat,p.lng)<=p.radius);
const aLbl=a=>a==="public"?{icon:"🌍",label:"Tout le monde",c:"#1D9E75",bg:"#E1F5EE"}:a==="private"?{icon:"🔒",label:"Moi seul",c:"#888",bg:"#f1efe8"}:{icon:"👥",label:`${Object.keys((a&&a.custom)||{}).length} abonné(s)`,c:"#378ADD",bg:"#E6F1FB"};

// ── CARTE LEAFLET ────────────────────────────────────────
function ZoneMap({posts,gps,myUid,onPostClick,users,showGpsPin=true,showControls=true}){
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const markersRef=useRef({});
  const circlesRef=useRef({});
  const myMarkerRef=useRef(null);
  const [hidden,setHidden]=useState(new Set());
  const [showF,setShowF]=useState(false);
  const [dateFilter,setDateFilter]=useState("all"); // all | today | week
  const authorIds=[...new Set(posts.map(p=>p.uid))];

  const now=Date.now();
  const filteredByDate=posts.filter(p=>{
    if(dateFilter==="today") return now-p.ts<86400000;
    if(dateFilter==="week")  return now-p.ts<604800000;
    return true;
  });
  const visPosts=filteredByDate.filter(p=>!hidden.has(p.uid));

  const centeredRef=useRef(false);

  // Init map
  useEffect(()=>{
    if(!mapRef.current||leafRef.current)return;
    const center=gps?[gps.lat,gps.lng]:[48.8566,2.3522];
    const map=L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView(center,15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
    L.control.zoom({position:'topright'}).addTo(map);
    leafRef.current=map;
    if(gps)centeredRef.current=true;
    return()=>{map.remove();leafRef.current=null;centeredRef.current=false;};
  },[]);

  // Centre sur GPS une seule fois au démarrage, jamais après
  useEffect(()=>{
    if(!leafRef.current||!gps||centeredRef.current)return;
    leafRef.current.setView([gps.lat,gps.lng],16,{animate:true});
    centeredRef.current=true;
  },[gps?.lat,gps?.lng]);

  // Marqueur "moi" — FIX: pas de transform CSS dans le HTML, iconAnchor seul positionne
  useEffect(()=>{
    if(!leafRef.current||!gps||!showGpsPin)return;
    if(myMarkerRef.current){myMarkerRef.current.setLatLng([gps.lat,gps.lng]);return;}
    const icon=L.divIcon({
      className:'',
      html:`<svg width="28" height="38" viewBox="0 0 28 38" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 37 C14 37 1 23 1 13 A13 13 0 1 1 27 13 C27 23 14 37 14 37Z" fill="#1D9E75" stroke="white" stroke-width="2"/>
        <circle cx="14" cy="12" r="5" fill="white"/>
      </svg>`,
      iconSize:[28,38],
      iconAnchor:[14,38]  // pointe en bas au centre — pas de transform CSS
    });
    myMarkerRef.current=L.marker([gps.lat,gps.lng],{icon,zIndexOffset:1000,interactive:false}).addTo(leafRef.current);
  },[gps?.lat,gps?.lng,showGpsPin]);

  // Posts markers + zones
  useEffect(()=>{
    if(!leafRef.current)return;
    Object.values(markersRef.current).forEach(m=>m.remove());
    Object.values(circlesRef.current).forEach(c=>c.remove());
    markersRef.current={};circlesRef.current={};
    visPosts.forEach(p=>{
      if(!p.lat||!p.lng)return;
      const hue=uidHue(p.uid);
      const u=users[p.uid];
      const ul=canSee(p,myUid,gps);
      const circle=L.circle([p.lat,p.lng],{radius:p.radius,color:hue,weight:1.5,fillColor:hue,fillOpacity:ul?0.1:0.04,dashArray:ul?null:'6 4'}).addTo(leafRef.current);
      circlesRef.current[p.id]=circle;
      const dot=L.divIcon({className:'',html:`<svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="${hue}" stroke="white" stroke-width="2"/></svg>`,iconSize:[14,14],iconAnchor:[7,7]});
      const marker=L.marker([p.lat,p.lng],{icon:dot}).addTo(leafRef.current);
      marker.on('click',()=>onPostClick&&onPostClick(p));
      const preview=ul?(p.text?p.text.slice(0,60):"📷 Photo"):"🔒 Hors zone";
      marker.bindPopup(`<b>${u?.pseudo||"Utilisateur"}</b><br/>${preview}`);
      markersRef.current[p.id]=marker;
    });
  },[visPosts.length,visPosts.map(p=>p.id).join(','),gps?.lat,gps?.lng,hidden,dateFilter]);

  const dateOpts=[{v:"all",l:"Tous"},{v:"today",l:"Aujourd'hui"},{v:"week",l:"Cette semaine"}];

  return h("div",{style:{position:"relative",height:"100%"}},
    h("div",{ref:mapRef,style:{width:"100%",height:"100%",minHeight:380,borderRadius:0,overflow:"hidden",zIndex:0}}),
    showControls&&h("div",{style:{position:"absolute",bottom:12,right:12,zIndex:999,display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}},
      h("button",{onClick:()=>setShowF(v=>!v),style:{padding:"6px 12px",fontSize:12,borderRadius:"var(--r)",cursor:"pointer",background:(hidden.size>0||dateFilter!=="all")?"#E6F1FB":"#fff",color:(hidden.size>0||dateFilter!=="all")?"#185FA5":"var(--text)",border:`1px solid ${(hidden.size>0||dateFilter!=="all")?"#378ADD":"var(--border2)"}`,boxShadow:"0 1px 4px rgba(0,0,0,0.15)"}},
        "Filtrer"+(hidden.size>0?` · ${authorIds.length-hidden.size}/${authorIds.length}`:"")+(dateFilter!=="all"?` · ${dateOpts.find(o=>o.v===dateFilter)?.l}`:"")
      ),
      showF&&h("div",{style:{background:"#fff",border:"0.5px solid var(--border2)",borderRadius:"var(--rl)",padding:"12px 14px",minWidth:200,boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}},
        // Tri par date
        h("div",{style:{fontSize:11,fontWeight:500,color:"var(--text2)",marginBottom:8}},"Période"),
        h("div",{style:{display:"flex",gap:5,marginBottom:12}},
          dateOpts.map(o=>h("button",{key:o.v,onClick:()=>setDateFilter(o.v),style:{flex:1,padding:"5px 4px",fontSize:11,borderRadius:"var(--r)",cursor:"pointer",fontWeight:dateFilter===o.v?500:400,background:dateFilter===o.v?"var(--bg2)":"transparent",border:dateFilter===o.v?"0.5px solid var(--border2)":"0.5px solid var(--border)",color:"var(--text)"}},o.l))
        ),
        // Filtre auteurs
        h("div",{style:{fontSize:11,fontWeight:500,color:"var(--text2)",marginBottom:8,display:"flex",justifyContent:"space-between"}},
          "Personnes",h("button",{onClick:()=>setHidden(new Set()),style:{fontSize:10,background:"transparent",border:"none",cursor:"pointer",color:"#378ADD",padding:0}},"Tout")
        ),
        authorIds.map(uid=>{const u=users[uid];const shown=!hidden.has(uid);const hue=uidHue(uid);
          return h("div",{key:uid,onClick:()=>setHidden(s=>{const n=new Set(s);n.has(uid)?n.delete(uid):n.add(uid);return n;}),style:{display:"flex",alignItems:"center",gap:8,padding:"5px 2px",cursor:"pointer"}},
            h("div",{style:{width:10,height:10,borderRadius:"50%",flexShrink:0,background:shown?hue:"var(--border)",border:`1.5px solid ${hue}`}}),
            h("span",{style:{fontSize:12,flex:1,color:shown?"var(--text)":"var(--text3)",fontWeight:shown?500:400}},u?.pseudo||uid.slice(0,8)),
            h("span",{style:{fontSize:10,color:"var(--text3)"}},posts.filter(p=>p.uid===uid).length)
          );
        })
      )
    )
  );
}

function GoogleSignIn({onSign,loading,error}){

        h("path",{fill:"#34A853",d:"M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"}),

        h("path",{fill:"#EA4335",d:"M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.46.89 11.65.02 8.98.02A8 8 0 0 0 1.83 5.43L4.5 7.5a4.77 4.77 0 0 1 4.48-3.92z"})

    )

function ProfileSetup({uid,onDone}){
  const [pseudo,setPseudo]=useState("");
  const [bio,setBio]=useState("");
  const [ville,setVille]=useState("");
  const [photo,setPhoto]=useState(null);
  const [saving,setSaving]=useState(false);
  const fileRef=useRef(null);
  const ok=pseudo.trim().length>=2;

  const handleFile=async f=>{
    if(!f||!f.type.startsWith("image/"))return;
    setPhoto(await compressImg(f));
  };

  const save=async()=>{
    if(!ok||saving)return;
    setSaving(true);
    await saveProfile(uid,{pseudo:pseudo.trim(),bio:bio.trim(),ville:ville.trim(),photo:photo||null,following:{},blocked:{},createdAt:Date.now()});
    onDone();
  };

  return h("div",{style:{padding:"0 24px 60px",background:"#fff",minHeight:"100vh"}},
    h("div",{style:{paddingTop:24,display:"flex",justifyContent:"flex-end"}},h("span",{style:{fontSize:12,color:"var(--text3)"}},"1 / 2")),
    h("h2",{style:{fontSize:20,fontWeight:500,margin:"12px 0 4px"}},"Crée ton profil"),
    h("p",{style:{fontSize:13,color:"var(--text2)",margin:"0 0 22px"}},"Ces informations seront visibles par les autres"),
    h("div",{style:{display:"flex",justifyContent:"center",marginBottom:22}},
      h("div",{style:{position:"relative",cursor:"pointer"},onClick:()=>fileRef.current?.click()},
        photo?h("img",{src:photo,style:{width:88,height:88,borderRadius:"50%",objectFit:"cover",display:"block",border:"3px solid #fff",outline:"2px solid var(--border2)"}})
          :h("div",{style:{width:88,height:88,borderRadius:"50%",background:"var(--bg2)",border:"2px dashed var(--border2)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3}},h("span",{style:{fontSize:22}},"📷"),h("span",{style:{fontSize:10,color:"var(--text3)"}},"Photo")),
        h("div",{style:{position:"absolute",bottom:2,right:2,width:24,height:24,borderRadius:"50%",background:"var(--text)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",border:"2px solid #fff"}},"✎"),
        h("input",{ref:fileRef,type:"file",accept:"image/*",style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(f)handleFile(f);}})
      )
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
      h("div",null,
        h("label",{style:{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:5}},"Pseudo *"),
        h("input",{value:pseudo,onChange:e=>setPseudo(e.target.value.replace(/[^a-zA-Z0-9_]/g,"")),placeholder:"ex: marie_explore",maxLength:24,style:{width:"100%",padding:"11px 14px",fontSize:14,border:`0.5px solid ${ok?"var(--border2)":"var(--border)"}`,borderRadius:"var(--r)",background:"#fff",color:"var(--text)"}}),
        h("div",{style:{fontSize:11,color:"var(--text3)",marginTop:3}},`${pseudo.length}/24 · lettres, chiffres et _`)
      ),

// ── RADIUS PREVIEW MAP ─────────────────────────────────────
function RadiusMap({gps,radius,height=140,fullscreen=false,locked=false,onMapReady=null}){
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const circleRef=useRef(null);
  const initDoneRef=useRef(false);

  useEffect(()=>{
    if(!mapRef.current||leafRef.current||!gps)return;
    const zoom=radius<150?17:radius<400?16:radius<1000?15:radius<2500?14:13;
    const map=L.map(mapRef.current,{
      zoomControl:false,attributionControl:false,
      dragging:!locked,scrollWheelZoom:!locked,
      doubleClickZoom:!locked,touchZoom:!locked,
      tap:!locked
    }).setView([gps.lat,gps.lng],zoom);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
    const iconHtml=fullscreen
      ?`<svg width="28" height="38" viewBox="0 0 28 38"><path d="M14 37C14 37 1 23 1 13A13 13 0 1 1 27 13C27 23 14 37 14 37Z" fill="#1D9E75" stroke="white" stroke-width="2"/><circle cx="14" cy="12" r="5" fill="white"/></svg>`
      :`<svg width="20" height="26" viewBox="0 0 20 26"><path d="M10 26C10 26 1 16 1 9A9 9 0 1 1 19 9C19 16 10 26 10 26Z" fill="#1D9E75" stroke="white" stroke-width="1.5"/><circle cx="10" cy="9" r="3.5" fill="white"/></svg>`;
    const iconSize=fullscreen?[28,38]:[20,26];
    const iconAnchor=fullscreen?[14,38]:[10,26];
    const icon=L.divIcon({className:'',html:iconHtml,iconSize,iconAnchor});
    L.marker([gps.lat,gps.lng],{icon,interactive:false}).addTo(map);
    circleRef.current=L.circle([gps.lat,gps.lng],{radius,color:"#1D9E75",weight:2,fillColor:"#1D9E75",fillOpacity:0.12}).addTo(map);
    leafRef.current=map;
    if(onMapReady)onMapReady(map);
    initDoneRef.current=true;
    return()=>{map.remove();leafRef.current=null;circleRef.current=null;initDoneRef.current=false;};
  },[gps?.lat,gps?.lng]);

  // Quand le radius change : met à jour le cercle SEULEMENT, pas le zoom ni la vue
  useEffect(()=>{
    if(!leafRef.current||!circleRef.current||!initDoneRef.current)return;
    circleRef.current.setRadius(radius);
    // Zoom automatique seulement si la carte vient d'être ouverte (initDone vient de passer à true)
    // Après ça, l'utilisateur est libre de naviguer
  },[radius]);

  const style=fullscreen
    ?{width:"100%",height:typeof height==="number"?height+"px":height}
    :{height,borderRadius:"var(--rl)",overflow:"hidden",border:"0.5px solid var(--border)"};

  if(!gps)return h("div",{style:{...style,background:"var(--bg2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"var(--text3)"}},"GPS requis");
  return h("div",{ref:mapRef,style});
}
// ── BEREAL CAMERA ──────────────────────────────────────────
function BeRealCamera({onCapture,onCancel,gps}){
  const [status,setStatus]=useState("init"); // init | loading | ready | countdown | error
  const [countdown,setCountdown]=useState(3);
  const [hasFront,setHasFront]=useState(false);
  const [errMsg,setErrMsg]=useState("");
  const backStreamRef=useRef(null);
  const frontStreamRef=useRef(null);
  const backVideoRef=useRef(null);
  const frontVideoRef=useRef(null);
  const frontPreviewRef=useRef(null);

  const stopAll=()=>{
    backStreamRef.current?.getTracks().forEach(t=>t.stop());
    frontStreamRef.current?.getTracks().forEach(t=>t.stop());
  };

  // Callback refs — assignent srcObject dès que le DOM est prêt
  const setBackRef=useCallback(el=>{
    backVideoRef.current=el;
    if(el&&backStreamRef.current){
      el.srcObject=backStreamRef.current;
      el.play().catch(()=>{});
    }
  },[]);

  const setFrontRef=useCallback(el=>{
    frontVideoRef.current=el;
    if(el&&frontStreamRef.current){
      el.srcObject=frontStreamRef.current;
      el.play().catch(()=>{});
    }
  },[]);

  const setFrontPreviewRef=useCallback(el=>{
    frontPreviewRef.current=el;
    if(el&&frontStreamRef.current){
      el.srcObject=frontStreamRef.current;
      el.play().catch(()=>{});
    }
  },[]);

  useEffect(()=>{
    let alive=true;
    const start=async()=>{
      setStatus("loading");
      // Caméra arrière
      let backStream=null;
      const constraints=[
        {video:{facingMode:{exact:"environment"}},audio:false},
        {video:{facingMode:"environment"},audio:false},
        {video:true,audio:false}
      ];
      for(const c of constraints){
        try{backStream=await navigator.mediaDevices.getUserMedia(c);break;}
        catch(e){continue;}
      }
      if(!backStream||!alive){
        if(alive)setErrMsg("Caméra non disponible. Vérifie les autorisations dans Réglages > Safari > Caméra.");
        if(alive)setStatus("error");
        return;
      }
      backStreamRef.current=backStream;
      // Assigner au video si déjà monté
      if(backVideoRef.current){
        backVideoRef.current.srcObject=backStream;
        backVideoRef.current.play().catch(()=>{});
      }
      // Caméra avant (optionnelle)
      try{
        const f=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false});
        if(!alive){f.getTracks().forEach(t=>t.stop());return;}
        frontStreamRef.current=f;
        if(frontVideoRef.current){frontVideoRef.current.srcObject=f;frontVideoRef.current.play().catch(()=>{});}
        if(frontPreviewRef.current){frontPreviewRef.current.srcObject=f;frontPreviewRef.current.play().catch(()=>{});}
        setHasFront(true);
      }catch(e){/* caméra avant non dispo, on continue */}
      if(alive)setStatus("ready");
    };
    start();
    return()=>{alive=false;stopAll();};
  },[]);

  const doCapture=()=>{
    setStatus("countdown");
    let c=3;setCountdown(c);
    const iv=setInterval(()=>{
      c--;
      if(c>0){setCountdown(c);}
      else{
        clearInterval(iv);
        setStatus("ready");
        doShoot();
      }
    },1000);
  };

  const doShoot=()=>{
    const back=backVideoRef.current;
    if(!back||back.videoWidth===0){
      // Fallback: essaie quand même
      setTimeout(()=>{
        const b=backVideoRef.current;
        if(!b)return;
        shoot(b);
      },500);
      return;
    }
    shoot(back);
  };

  const shoot=(back)=>{
    const bW=back.videoWidth||640,bH=back.videoHeight||480;
    const cv=document.createElement('canvas');cv.width=bW;cv.height=bH;
    const ctx=cv.getContext('2d');
    ctx.drawImage(back,0,0,bW,bH);
    const front=frontVideoRef.current;
    if(hasFront&&front&&front.videoWidth>0){
      const fW=front.videoWidth,fH=front.videoHeight;
      const pw=Math.round(bW*0.30),ph=Math.round(fH/fW*pw);
      const px=bW-pw-16,py=bH-ph-16,r=12;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(px+r,py);ctx.arcTo(px+pw,py,px+pw,py+ph,r);
      ctx.arcTo(px+pw,py+ph,px,py+ph,r);ctx.arcTo(px,py+ph,px,py,r);
      ctx.arcTo(px,py,px+pw,py,r);ctx.closePath();ctx.clip();
      ctx.drawImage(front,0,0,fW,fH,px,py,pw,ph);
      ctx.restore();
      ctx.strokeStyle='#fff';ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(px+r,py);ctx.arcTo(px+pw,py,px+pw,py+ph,r);
      ctx.arcTo(px+pw,py+ph,px,py+ph,r);ctx.arcTo(px,py+ph,px,py,r);
      ctx.arcTo(px,py,px+pw,py,r);ctx.closePath();ctx.stroke();
    }
    onCapture(cv.toDataURL('image/jpeg',0.85),gps);
  };

  // Écran d'erreur
  if(status==="error") return h("div",{style:{
    position:"fixed",inset:0,background:"#111",zIndex:200,
    display:"flex",flexDirection:"column",alignItems:"center",
    justifyContent:"center",padding:32,textAlign:"center"
  }},
    h("div",{style:{fontSize:48,marginBottom:16}},"📷"),
    h("div",{style:{color:"#fff",fontSize:15,lineHeight:1.7,marginBottom:24}},errMsg),
    h("div",{style:{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:24}},"Réglages → Safari → Caméra → Autoriser"),
    h("button",{onClick:onCancel,style:{padding:"12px 28px",background:"#fff",border:"none",borderRadius:24,fontSize:14,fontWeight:600,cursor:"pointer"}},"Retour")
  );

  // Overlay caméra
  return h("div",{style:{position:"fixed",inset:0,background:"#000",zIndex:200,overflow:"hidden"}},
    // Vidéo arrière plein écran
    h("video",{
      ref:setBackRef,
      style:{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"},
      playsInline:true,muted:true,autoPlay:true
    }),
    // Vidéo avant cachée (pour capture canvas)
    h("video",{
      ref:setFrontRef,
      style:{position:"absolute",width:1,height:1,opacity:0,pointerEvents:"none"},
      playsInline:true,muted:true,autoPlay:true
    }),
    // Preview caméra avant
    hasFront&&h("div",{style:{
      position:"absolute",bottom:130,right:16,
      width:90,height:120,borderRadius:14,
      overflow:"hidden",border:"3px solid #fff",
      boxShadow:"0 4px 20px rgba(0,0,0,0.6)"
    }},
      h("video",{
        ref:setFrontPreviewRef,
        style:{width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)"},
        playsInline:true,muted:true,autoPlay:true
      })
    ),
    // Décompte
    status==="countdown"&&h("div",{style:{
      position:"absolute",inset:0,display:"flex",
      alignItems:"center",justifyContent:"center",
      fontSize:120,color:"#fff",fontWeight:800,
      textShadow:"0 4px 24px rgba(0,0,0,0.7)"
    }},countdown),
    // Loading
    status==="loading"&&h("div",{style:{
      position:"absolute",inset:0,display:"flex",
      alignItems:"center",justifyContent:"center",
      flexDirection:"column",gap:12
    }},
      h("div",{style:{color:"#fff",fontSize:14}},"Initialisation de la caméra…")
    ),
    // Contrôles bas
    h("div",{style:{
      position:"absolute",bottom:40,left:0,right:0,
      display:"flex",alignItems:"center",justifyContent:"center",gap:40
    }},
      h("button",{onClick:()=>{stopAll();onCancel();},style:{
        padding:"11px 22px",background:"rgba(255,255,255,0.2)",
        border:"1.5px solid rgba(255,255,255,0.5)",
        borderRadius:24,color:"#fff",fontSize:14,cursor:"pointer"
      }},"Annuler"),
      status==="ready"&&h("button",{onClick:doCapture,style:{
        width:72,height:72,borderRadius:"50%",background:"#fff",
        border:"5px solid rgba(255,255,255,0.5)",cursor:"pointer",flexShrink:0,
        boxShadow:"0 4px 20px rgba(0,0,0,0.4)"
      }})
    ),
    // Label haut
    h("div",{style:{
      position:"absolute",top:50,left:0,right:0,
      textAlign:"center",color:"rgba(255,255,255,0.9)",
      fontSize:13,fontWeight:500
    }},hasFront?"📸 Avant + Arrière":"📸 Photo")
  );
}

// ── EXIF GPS MANUEL ───────────────────────────────────────
function readExifGpsManual(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const buf=e.target.result;
        const view=new DataView(buf);
        // Vérifie que c'est bien un JPEG
        if(view.getUint16(0)!==0xFFD8){resolve(null);return;}
        let offset=2;
        while(offset<buf.byteLength-2){
          const marker=view.getUint16(offset);
          offset+=2;
          if(marker===0xFFE1){// APP1 = EXIF
            const len=view.getUint16(offset);
            const exifStr=String.fromCharCode(...new Uint8Array(buf,offset+2,4));
            if(exifStr==="Exif"){
              const tiffStart=offset+8;
              const endian=view.getUint16(tiffStart);
              const le=endian===0x4949;
              const getU16=(o)=>view.getUint16(tiffStart+o,le);
              const getU32=(o)=>view.getUint32(tiffStart+o,le);
              // IFD0
              const ifd0=getU32(4);
              const ifd0Count=getU16(ifd0);
              let gpsOffset=null;
              for(let i=0;i<ifd0Count;i++){
                const tag=getU16(ifd0+2+i*12);
                if(tag===0x8825){gpsOffset=getU32(ifd0+2+i*12+8);break;}
              }
              if(gpsOffset!==null){
                const gpsCount=getU16(gpsOffset);
                let lat=null,lng=null,latRef="N",lngRef="E";
                for(let i=0;i<gpsCount;i++){
                  const tag=getU16(gpsOffset+2+i*12);
                  const valOff=getU32(gpsOffset+2+i*12+8);
                  if(tag===1) latRef=String.fromCharCode(view.getUint8(tiffStart+valOff));
                  if(tag===3) lngRef=String.fromCharCode(view.getUint8(tiffStart+valOff));
                  if(tag===2||tag===4){
                    const toD=(off)=>{
                      const d=getU32(off)/getU32(off+4);
                      const m=getU32(off+8)/getU32(off+12);
                      const s=getU32(off+16)/getU32(off+20);
                      return d+m/60+s/3600;
                    };
                    if(tag===2) lat=toD(tiffStart+valOff);
                    if(tag===4) lng=toD(tiffStart+valOff);
                  }
                }
                if(lat!==null&&lng!==null){
                  resolve({lat:latRef==="S"?-lat:lat,lng:lngRef==="W"?-lng:lng});
                  return;
                }
              }
            }
            offset+=len;
          } else if((marker&0xFF00)===0xFF00){
            offset+=view.getUint16(offset);
          } else break;
        }
        resolve(null);
      }catch(e){resolve(null);}
    };
    reader.onerror=()=>resolve(null);
    reader.readAsArrayBuffer(file);
  });
}

// ── CARTE ZONE UNIQUE (pour l'étape de définition du rayon) ─
function ZoneMapSingle({gps,radius}){
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const circleRef=useRef(null);

  useEffect(()=>{
    if(!mapRef.current||leafRef.current||!gps)return;
    // Petit délai pour que le DOM ait sa hauteur finale sur iOS
    const init=()=>{
      if(!mapRef.current)return;
      const map=L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView([gps.lat,gps.lng],15);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
      L.control.zoom({position:'topright'}).addTo(map);
      const icon=L.divIcon({className:'',html:`<svg width="28" height="38" viewBox="0 0 28 38"><path d="M14 37C14 37 1 23 1 13A13 13 0 1 1 27 13C27 23 14 37 14 37Z" fill="#1D9E75" stroke="white" stroke-width="2"/><circle cx="14" cy="12" r="5" fill="white"/></svg>`,iconSize:[28,38],iconAnchor:[14,38]});
      L.marker([gps.lat,gps.lng],{icon,interactive:false}).addTo(map);
      circleRef.current=L.circle([gps.lat,gps.lng],{radius,color:"#1D9E75",weight:2,fillColor:"#1D9E75",fillOpacity:0.13}).addTo(map);
      leafRef.current=map;
      // Force recalcul taille après rendu
      setTimeout(()=>{map.invalidateSize();},100);
    };
    const t=setTimeout(init,50);
    return()=>{clearTimeout(t);if(leafRef.current){leafRef.current.remove();leafRef.current=null;circleRef.current=null;}};
  },[gps?.lat,gps?.lng]);

  useEffect(()=>{
    if(!leafRef.current||!circleRef.current||!gps)return;
    circleRef.current.setRadius(radius);
    // Pas de setView ici — l'utilisateur doit pouvoir naviguer librement
  },[radius]);

  if(!gps) return h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,color:"var(--text3)",fontSize:14}},"⚠️ GPS non disponible");
  return h("div",{ref:mapRef,style:{position:"absolute",inset:0}});
}

// ── ZONE PICKER SCREEN ────────────────────────────────────
// Composant autonome : gère sa propre carte Leaflet + overlays
// Rendu en position:fixed fullscreen, les overlays sont dans le même flux DOM
function ZonePickerScreen({gps,radius,onRadiusChange,onConfirm,onBack,fR}){
  const mapDivRef=useRef(null);
  const leafRef=useRef(null);
  const circleRef=useRef(null);

  // Init carte une seule fois
  useEffect(()=>{
    if(!mapDivRef.current||leafRef.current||!gps)return;
    const zoom=radius<150?17:radius<400?16:radius<1000?15:radius<2500?14:13;
    const map=L.map(mapDivRef.current,{
      zoomControl:false,attributionControl:false,
      dragging:true,scrollWheelZoom:true,
      doubleClickZoom:true,touchZoom:true
    }).setView([gps.lat,gps.lng],zoom);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
    L.control.zoom({position:'topright'}).addTo(map);
    const icon=L.divIcon({className:'',html:`<svg width="28" height="38" viewBox="0 0 28 38"><path d="M14 37C14 37 1 23 1 13A13 13 0 1 1 27 13C27 23 14 37 14 37Z" fill="#1D9E75" stroke="white" stroke-width="2"/><circle cx="14" cy="12" r="5" fill="white"/></svg>`,iconSize:[28,38],iconAnchor:[14,38]});
    L.marker([gps.lat,gps.lng],{icon,interactive:false}).addTo(map);
    circleRef.current=L.circle([gps.lat,gps.lng],{radius,color:"#1D9E75",weight:2.5,fillColor:"#1D9E75",fillOpacity:0.13}).addTo(map);
    leafRef.current=map;
    return()=>{map.remove();leafRef.current=null;circleRef.current=null;};
  },[]);

  // Mettre à jour le cercle quand radius change — pas de recentrage
  useEffect(()=>{
    if(!leafRef.current||!circleRef.current||!gps)return;
    circleRef.current.setRadius(radius);
  },[radius]);

  // La carte remplit tout l'écran via une div absolue
  // Les overlays sont positionnés par-dessus avec z-index élevé
  return h("div",{style:{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:200}},
    // Carte en fond absolu
    h("div",{ref:mapDivRef,style:{position:"absolute",top:0,left:0,right:0,bottom:0}}),
    // Bouton retour — coin haut gauche
    h("button",{
      onClick:onBack,
      style:{
        position:"absolute",top:54,left:16,zIndex:300,
        width:42,height:42,borderRadius:12,
        background:"#fff",border:"none",cursor:"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",
        boxShadow:"0 2px 16px rgba(0,0,0,0.25)"
      }
    },h("svg",{width:20,height:20,viewBox:"0 0 24 24",fill:"none",stroke:"#0D1117",strokeWidth:2.5},h("polyline",{points:"15 18 9 12 15 6"}))),
    // Badge rayon — coin haut droit
    h("div",{style:{
      position:"absolute",top:56,right:16,zIndex:300,
      padding:"9px 18px",background:"#fff",
      borderRadius:24,boxShadow:"0 2px 16px rgba(0,0,0,0.25)"
    }},h("span",{style:{fontSize:16,fontWeight:800,color:"#1D9E75"}},fR(radius))),
    // Îlot bas — slider + bouton confirmer
    h("div",{style:{
      position:"absolute",bottom:48,left:16,right:16,zIndex:300,
      background:"#fff",borderRadius:22,
      padding:"18px 20px 18px",
      boxShadow:"0 8px 40px rgba(0,0,0,0.22)"
    }},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
        h("span",{style:{fontSize:14,fontWeight:600,color:"#0D1117"}},"Zone de visibilité"),
        h("span",{style:{fontSize:14,fontWeight:800,color:"#1D9E75"}},fR(radius))
      ),
      h("input",{
        type:"range",min:50,max:5000,step:50,value:radius,
        onChange:e=>onRadiusChange(Number(e.target.value)),
        style:{width:"100%",accentColor:"#1D9E75",marginBottom:8}
      }),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:16,fontSize:11,color:"#9CA3AF"}},
        h("span",null,"50 m"),h("span",null,"2,5 km"),h("span",null,"5 km")
      ),
      h("button",{
        onClick:onConfirm,
        style:{
          width:"100%",padding:15,fontSize:15,fontWeight:700,
          background:"#1D9E75",color:"#fff",border:"none",
          borderRadius:14,cursor:"pointer",
          boxShadow:"0 4px 20px rgba(29,158,117,0.4)"
        }
      },"✓ Confirmer cette zone")
    )
  );
}

// ── PUBLICATION ───────────────────────────────────────────
function PublishScreen({myUid,gps,cats,onBack}){
  const [step,setStep]=useState("form"); // form | crop | zone
  const [rawPhoto,setRawPhoto]=useState(null);
  const [photo,setPhoto]=useState(null);
  const [photoGps,setPhotoGps]=useState(null);
  const [txt,setTxt]=useState("");
  const [rad,setRad]=useState(300);
  const [zoneConfirmed,setZoneConfirmed]=useState(false);
  const [sel,setSel]=useState(null);
  const [saving,setSaving]=useState(false);
  const leafZoneRef=useRef(null);
  const fileRef=useRef(null);
  const sC=cats.find(c=>c.id===sel);
  const lb=sC?aLbl(sC.access):null;
  const postGps=photoGps||gps;
  const fR=m=>m>=1000?`${(m/1000).toFixed(1)} km`:`${m} m`;
  // Peut aller à l'étape zone : faut au moins une photo OU du texte + GPS
  const canGoZone=!!(txt.trim()||photo)&&!!postGps;
  // Peut publier : contenu + GPS + zone confirmée
  const canPost=canGoZone&&zoneConfirmed;

  const handleFile=async f=>{
    if(!f||!f.type.startsWith("image/"))return;
    let exifGps=null;
    try{
      if(window.Exifr){try{const r=await window.Exifr.gps(f);if(r?.latitude&&r?.longitude)exifGps={lat:r.latitude,lng:r.longitude};}catch(e){}}
      if(!exifGps)exifGps=await readExifGpsManual(f);
    }catch(e){}
    setPhotoGps(exifGps);
    const r=new FileReader();
    r.onload=e=>{setRawPhoto(e.target.result);setStep("crop");};
    r.readAsDataURL(f);
  };

  const doPost=async()=>{
    if(!canPost||saving)return;
    setSaving(true);
    let finalPhoto=photo;
    if(photo){
      const compressed=await new Promise(ok=>{const i=new Image();i.onload=()=>{const MAX=800,sc=Math.min(1,MAX/Math.max(i.width,i.height));const c=document.createElement('canvas');c.width=Math.round(i.width*sc);c.height=Math.round(i.height*sc);c.getContext('2d').drawImage(i,0,0,c.width,c.height);ok(c.toDataURL('image/jpeg',0.6));};i.src=photo;});
      finalPhoto=compressed;
    }
    await pushPost(myUid,{text:txt.trim(),photo:finalPhoto||null,lat:postGps.lat,lng:postGps.lng,radius:rad,cat:sel,uid:myUid});
    setSaving(false);onBack();
  };

  const BackBtn=({onClick})=>h("button",{onClick,style:{width:40,height:40,borderRadius:12,background:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"var(--shadow)",flexShrink:0}},
    h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"var(--text)",strokeWidth:2.5},h("polyline",{points:"15 18 9 12 15 6"}))
  );

  // ── ÉTAPE RECADRAGE ──
  if(step==="crop"&&rawPhoto) return h("div",{style:{minHeight:"100vh",background:"var(--bg3)",padding:"0 16px 40px"}},
    h("div",{style:{paddingTop:56,display:"flex",alignItems:"center",gap:14,marginBottom:20}},
      h(BackBtn,{onClick:()=>{setRawPhoto(null);setStep("form");}}),
      h("span",{style:{fontSize:17,fontWeight:700}},"Recadrer la photo")
    ),
    h(CropTool,{src:rawPhoto,onConfirm:cropped=>{setPhoto(cropped);setStep("form");},onCancel:()=>{setRawPhoto(null);setStep("form");}})
  );

  // ── ÉTAPE 2 : ZONE ──
  if(step==="zone") return h("div",{style:{minHeight:"100vh",background:"var(--bg3)",display:"flex",flexDirection:"column"}},
    h("div",{style:{position:"sticky",top:0,zIndex:10,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(12px)",borderBottom:"0.5px solid var(--border)",padding:"0 16px"}},
      h("div",{style:{paddingTop:52,paddingBottom:14,display:"flex",alignItems:"center",gap:14}},
        h(BackBtn,{onClick:()=>setStep("form")}),
        h("span",{style:{fontSize:17,fontWeight:700,flex:1}},"Définir la zone"),
        h("span",{style:{fontSize:15,fontWeight:800,color:"var(--green)"}},fR(rad))

    h("div",{style:{flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}},
      // Carte avec zoom buttons manuels — pas de touch/drag pour éviter le bounce iOS
      h("div",{style:{position:"relative"}},
        h(RadiusMap,{gps:postGps,radius:rad,height:320,locked:true,onMapReady:m=>leafZoneRef.current=m}),
        h("div",{style:{position:"absolute",top:8,right:8,display:"flex",flexDirection:"column",gap:4,zIndex:10}},
          h("button",{onClick:()=>{if(leafZoneRef.current)leafZoneRef.current.zoomIn();},style:{width:32,height:32,background:"#fff",border:"none",borderRadius:8,fontSize:18,cursor:"pointer",boxShadow:"0 1px 6px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600}},"+"),
          h("button",{onClick:()=>{if(leafZoneRef.current)leafZoneRef.current.zoomOut();},style:{width:32,height:32,background:"#fff",border:"none",borderRadius:8,fontSize:18,cursor:"pointer",boxShadow:"0 1px 6px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600}},"−")
        )

      h("div",{style:{background:"#fff",borderRadius:"var(--rl)",padding:"16px",boxShadow:"var(--shadow)"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13,fontWeight:600}},
          h("span",null,"Rayon de visibilité"),
          h("span",{style:{color:"var(--green)"}},fR(rad))

        h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:10,color:"var(--text3)"}},

        borderRadius:"var(--rl)",cursor:"pointer",
        boxShadow:"0 4px 20px rgba(29,158,117,0.35)"
      }},"✓ Confirmer cette zone")
    )
  );

  // ── ÉTAPE 1 : FORMULAIRE ──
  return h("div",{style:{minHeight:"100vh",background:"var(--bg3)",display:"flex",flexDirection:"column"}},
    // Header
    h("div",{style:{position:"sticky",top:0,zIndex:10,background:"rgba(255,255,255,0.96)",backdropFilter:"blur(12px)",borderBottom:"0.5px solid var(--border)",padding:"0 16px"}},
      h("div",{style:{paddingTop:52,paddingBottom:14,display:"flex",alignItems:"center",gap:14}},
        h(BackBtn,{onClick:onBack}),
        h("span",{style:{fontSize:17,fontWeight:700,flex:1}},"Nouveau post"),
        gps?h("span",{style:{fontSize:11,color:"var(--green)",fontWeight:500}},"📍 GPS actif")

      )
    ),

    h("div",{style:{flex:1,padding:"16px 16px 0"}},
      // Photo
      photo
        ?h("div",{style:{position:"relative",marginBottom:14,borderRadius:"var(--rl)",overflow:"hidden"}},
            h("img",{src:photo,style:{width:"100%",display:"block",aspectRatio:"4/3",objectFit:"cover"}}),
            h("div",{style:{position:"absolute",top:10,left:10}},
              photoGps
                ?h("div",{style:{background:"rgba(29,158,117,0.88)",padding:"5px 11px",borderRadius:20,fontSize:12,color:"#fff",fontWeight:600}},"📍 GPS de la photo")
                :h("div",{style:{background:"rgba(0,0,0,0.55)",padding:"5px 11px",borderRadius:20,fontSize:12,color:"#fff"}},"📍 Ta position actuelle")

function SearchScreen({users,myUid,onGoProfile}){

      .map(([uid,u])=>{
        const pseudo=(u.pseudo||"").toLowerCase();

        // score: starts-with = best, contains = ok

// ── DAILY CHALLENGE + STREAK ──────────────────────────────
// Génère une heure aléatoire reproductible pour un jour donné
function getDailyTime(dateStr){
  let h=0;for(const c of dateStr)h=(h*31+c.charCodeAt(0))%86400;
  const base=8*3600;const range=14*3600; // entre 8h et 22h
  return base+(h%range);
}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function nowSecs(){return Math.floor(Date.now()/1000)%86400;}

function DailyBanner({myUid,gps,onPost,streak}){
  const [secsLeft,setSecsLeft]=useState(null);
  const [dismissed,setDismissed]=useState(false);
  const day=todayStr();
  const challengeTime=getDailyTime(day);
  const WINDOW=300; // 5 minutes

  useEffect(()=>{
    const tick=()=>{
      const now=nowSecs();
      const diff=now-challengeTime;
      if(diff>=0&&diff<WINDOW)setSecsLeft(WINDOW-diff);
      else setSecsLeft(null);
    };
    tick();
    const iv=setInterval(tick,1000);
    return()=>clearInterval(iv);
  },[]);

  if(secsLeft===null||dismissed)return null;
  const mins=Math.floor(secsLeft/60);const secs=secsLeft%60;

  return h("div",{style:{position:"fixed",top:0,left:0,right:0,maxWidth:460,margin:"0 auto",zIndex:200,padding:"0 0 0 0"}},
    h("div",{style:{background:"#1D9E75",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}},
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:14,fontWeight:600,color:"#fff"}},"📸 Zone Moment !"),
        h("div",{style:{fontSize:12,color:"rgba(255,255,255,0.85)",marginTop:2}},`Poste une photo dans ${mins}:${String(secs).padStart(2,'0')} pour garder ta streak 🔥`)
      ),
      streak>0&&h("div",{style:{fontSize:12,color:"#fff",fontWeight:500,background:"rgba(255,255,255,0.2)",padding:"4px 8px",borderRadius:12}}),
      h("button",{onClick:()=>onPost(),style:{padding:"7px 14px",background:"#fff",border:"none",borderRadius:16,fontSize:12,fontWeight:600,color:"#1D9E75",cursor:"pointer"}},"Poster"),
      h("button",{onClick:()=>setDismissed(true),style:{background:"transparent",border:"none",color:"rgba(255,255,255,0.7)",fontSize:18,cursor:"pointer",padding:"0 0 0 4px",lineHeight:1}},"×")
    )
  );
}

// Vérifie et met à jour le streak après un post
async function checkAndUpdateStreak(myUid){
  const day=todayStr();
  const challengeTime=getDailyTime(day);
  const now=nowSecs();
  if(now-challengeTime<0||now-challengeTime>=300)return; // hors fenêtre
  const ref=db.ref(`users/${myUid}/streak`);
  const snap=await ref.once('value');
  const s=snap.val()||{count:0,lastDay:""};
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=`${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
  const newCount=s.lastDay===yStr?s.count+1:s.lastDay===day?s.count:1;
  await ref.set({count:newCount,lastDay:day});
}

// ── APP PRINCIPALE ────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("loading"); // loading | welcome | google | setup | gps | app
  const [authUser,setAuthUser]=useState(null);
  const [users,setUsers]=useState({});
  const [posts,setPosts]=useState([]);
  const [myCats,setMyCats]=useState([]);
  const [gps,setGps]=useState(null);
  const [stack,setStack]=useState([{id:"feed"}]);
  const [mapPin,setMapPin]=useState(false);
  const [signLoading,setSignLoading]=useState(false);
  const [signError,setSignError]=useState(false);

  const push=s=>setStack(p=>[...p,s]);
  const pop=()=>setStack(p=>p.length>1?p.slice(0,-1):p);
  const goRoot=id=>{setStack([{id}]);setMapPin(false);};
  const cur=stack[stack.length-1];
  const isRoot=stack.length===1;
  const activeTab=isRoot?cur.id:null;

  // Auth listener
  useEffect(()=>{
    return auth.onAuthStateChanged(async user=>{
      if(!user){setAuthUser(null);setPhase("welcome");return;}
      setAuthUser(user);
      const snap=await db.ref('users/'+user.uid).once('value');
      if(!snap.exists()){setPhase("setup");return;}
      setPhase("gps");
    });
  },[]);

  // DB listeners
  useEffect(()=>{
    if(!authUser)return;
    const pRef=db.ref('posts');
    const uRef=db.ref('users');
    const cRef=db.ref('categories/'+authUser.uid);
    const onP=snap=>{
      const d=snap.val()||{};
      const arr=Object.entries(d).map(([id,v])=>({id,...v})).sort((a,b)=>b.ts-a.ts);
      setPosts(arr);
    };
    const onU=snap=>setUsers(snap.val()||{});
    const onC=snap=>{const d=snap.val()||{};setMyCats(Object.entries(d).map(([id,v])=>({id,...v})));};
    pRef.on('value',onP);uRef.on('value',onU);cRef.on('value',onC);
    return()=>{pRef.off('value',onP);uRef.off('value',onU);cRef.off('value',onC);};
  },[authUser]);

  // GPS
  useEffect(()=>{
    if(phase!=="app"&&phase!=="gps")return;
    if(!navigator.geolocation){if(phase==="gps")setPhase("app");return;}
    const wid=navigator.geolocation.watchPosition(
      pos=>{setGps({lat:pos.coords.latitude,lng:pos.coords.longitude});if(phase==="gps")setPhase("app");},
      ()=>{if(phase==="gps")setPhase("app");},
      {enableHighAccuracy:true,maximumAge:15000,timeout:20000}
    );
    return()=>navigator.geolocation.clearWatch(wid);
  },[phase]);

  const signIn=async()=>{
    setSignLoading(true);setSignError(false);
    try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
    catch(e){setSignError(true);setSignLoading(false);}
  };

  // ── Phases pré-app ──
  if(phase==="loading") return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#fff"}},
    h("div",{style:{textAlign:"center"}},
      h("div",{style:{width:56,height:56,borderRadius:14,background:"#1D9E75",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}},h("span",{style:{fontSize:24,color:"#fff",fontWeight:600}},"Z")),
      h("div",{style:{fontSize:13,color:"var(--text3)"}},"Chargement…")
    )
  );
  if(phase==="welcome") return h(Welcome,{onStart:()=>setPhase("google")});
  if(phase==="google") return h(GoogleSignIn,{onSign:signIn,loading:signLoading,error:signError});
  if(phase==="setup") return h(ProfileSetup,{uid:authUser.uid,onDone:()=>setPhase("gps")});
  if(phase==="gps") return h(GpsScreen,{onDone:()=>setPhase("app")});

  // ── App principale ──
  const myUid=authUser.uid;
  const myBlocked=Object.keys(users[myUid]?.blocked||{});
  const visiblePosts=posts.filter(p=>!myBlocked.includes(p.uid));
  const unlockedCount=visiblePosts.filter(p=>canSee(p,myUid,gps)).length;
  const isMapFull=cur.id==="map"&&isRoot;
  const slideClass=stack.length>1?"s-in":"s-back";

  // Tab icons SVG
  const TabIcon=({id,active})=>{
    const c=active?"var(--green)":"var(--text3)";
    const w=2;
    if(id==="feed") return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:w},h("rect",{x:3,y:3,width:7,height:7,rx:1}),h("rect",{x:14,y:3,width:7,height:7,rx:1}),h("rect",{x:3,y:14,width:7,height:7,rx:1}),h("rect",{x:14,y:14,width:7,height:7,rx:1}));
    if(id==="map") return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:w},h("polygon",{points:"1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"}),h("line",{x1:8,y1:2,x2:8,y2:18}),h("line",{x1:16,y1:6,x2:16,y2:22}));
    if(id==="search") return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:w},h("circle",{cx:11,cy:11,r:8}),h("path",{d:"m21 21-4.35-4.35"}));
    if(id==="profile") return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:w},h("path",{d:"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"}),h("circle",{cx:12,cy:7,r:4}));
    return null;
  };

  const tabs=[["feed","Feed"],["map","Carte"],["search","Recherche"],["profile","Profil"]];
  const isPublish=cur.id==="publish";
  const showFAB=(cur.id==="feed"||cur.id==="map")&&isRoot;

  // Floating tab bar
  const TabBar=()=>h("div",{style:{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:428,zIndex:50}},
    h("div",{style:{background:"rgba(255,255,255,0.96)",backdropFilter:"blur(20px)",borderRadius:"var(--rxl)",boxShadow:"0 8px 32px rgba(0,0,0,0.12)",padding:"10px 8px",display:"flex",alignItems:"center"}},
      tabs.map(([k,l])=>h("button",{key:k,onClick:()=>goRoot(k),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"6px 4px",border:"none",background:"transparent",cursor:"pointer"}},
        h(TabIcon,{id:k,active:activeTab===k}),
        h("span",{style:{fontSize:10,fontWeight:activeTab===k?600:400,color:activeTab===k?"var(--green)":"var(--text3)"}},l)
      ))
    )
  );

  return h("div",{style:{minHeight:"100vh",background:"var(--bg3)"}},

    // Carte plein écran
    isMapFull&&h("div",{style:{position:"fixed",inset:0,zIndex:5,maxWidth:460,margin:"0 auto",width:"100%"}},
      h("div",{style:{position:"absolute",top:16,left:16,right:16,zIndex:20,display:"flex",alignItems:"center",gap:10}},
        h("div",{style:{flex:1,background:"rgba(255,255,255,0.96)",backdropFilter:"blur(12px)",borderRadius:"var(--rl)",padding:"12px 16px",boxShadow:"var(--shadow2)"}},
          h("div",{style:{fontSize:16,fontWeight:700}},"Carte des zones"),
          h("div",{style:{fontSize:12,color:"var(--text2)",marginTop:1}},`${unlockedCount} post${unlockedCount>1?"s":""} visible${unlockedCount>1?"s":""}`)
        ),
        h("div",{style:{width:44,height:44,background:"rgba(255,255,255,0.96)",backdropFilter:"blur(12px)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"var(--shadow2)",cursor:"pointer",flexShrink:0}},
          h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:gps?"var(--green)":"var(--text3)",strokeWidth:2},h("circle",{cx:12,cy:10,r:3}),h("path",{d:"M12 2a8 8 0 0 0-8 8c0 5.4 8 14 8 14s8-8.6 8-14a8 8 0 0 0-8-8z"}))
        )
      ),
      h("div",{style:{position:"absolute",inset:0}},
        h(ZoneMap,{posts:visiblePosts,gps,myUid,onPostClick:p=>push({id:"profile",uk:p.uid}),users,showGpsPin:true,showControls:true})
      ),
      // Posts défilants en bas de carte
      visiblePosts.filter(p=>canSee(p,myUid,gps)).length>0&&h("div",{style:{position:"absolute",bottom:90,left:0,right:0,zIndex:15}},
        h("div",{style:{display:"flex",gap:10,overflowX:"auto",padding:"0 16px",paddingBottom:4,scrollbarWidth:"none"}},
          visiblePosts.filter(p=>canSee(p,myUid,gps)&&p.lat&&p.lng).slice(0,10).map(p=>{
            const u=users[p.uid];const d=gps?haversine(gps.lat,gps.lng,p.lat,p.lng):0;
            return h("div",{key:p.id,onClick:()=>push({id:"profile",uk:p.uid}),style:{flexShrink:0,width:160,background:"#fff",borderRadius:"var(--rl)",overflow:"hidden",boxShadow:"var(--shadow2)",cursor:"pointer"}},
              p.photo?h("img",{src:p.photo,style:{width:"100%",height:100,objectFit:"cover",display:"block"}}):h("div",{style:{height:60,background:"var(--gbg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}},p.text?p.text.slice(0,1):"📍"),
              h("div",{style:{padding:"8px 10px"}},
                h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
                  h(Av,{photo:u?.photo,pseudo:u?.pseudo||"?",sz:18,hue:uidHue(p.uid)}),
                  h("span",{style:{fontSize:11,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},u?.pseudo||"…")
                ),
                h("div",{style:{fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.text||"📷 Photo"),
                h("div",{style:{fontSize:10,color:"var(--green)",marginTop:3,fontWeight:500}},fmtD(d))
              )
            );
          })
        )
      ),
      h(TabBar),
      showFAB&&h("div",{style:{position:"absolute",bottom:100,right:20,zIndex:25}},
        h("button",{onClick:()=>push({id:"publish"}),style:{width:54,height:54,borderRadius:"50%",background:"var(--green)",color:"#fff",border:"none",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(29,158,117,0.4)"}},"＋")
      )
    ),

    // Autres écrans
    !isMapFull&&h("div",{key:cur.id+(cur.uk||""),className:stack.length>1?slideClass:""},

      cur.id==="feed"&&h("div",{style:{paddingBottom:120}},
        // Feed header
        h("div",{style:{padding:"56px 20px 16px",display:"flex",alignItems:"flex-start",justifyContent:"space-between"}},
          h("div",null,
            h("div",{style:{fontSize:28,fontWeight:800,letterSpacing:"-0.5px"}},"Feed"),
            h("div",{style:{fontSize:14,color:"var(--text2)",marginTop:2}},"Découvre ce qui se passe autour de toi")
          ),
          h("div",{style:{width:44,height:44,borderRadius:12,background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"var(--shadow)",cursor:"pointer"}},
            h("span",{style:{fontSize:20,fontWeight:800,color:"var(--green)"}},"Z")
          )
        ),
        !gps&&h("div",{style:{margin:"0 16px 12px",padding:"12px 16px",background:"#FFF3CD",borderRadius:"var(--r)",fontSize:13,color:"#856404",display:"flex",alignItems:"center",gap:8}},
          h("span",null,"⚠️"),h("span",null,"GPS non disponible")
        ),
        visiblePosts.length===0
          ?h("div",{style:{margin:"0 16px",background:"#fff",borderRadius:"var(--rl)",padding:"60px 24px",textAlign:"center",boxShadow:"var(--shadow)"}},
              h("div",{style:{fontSize:40,marginBottom:12}},"📍"),
              h("div",{style:{fontSize:16,fontWeight:600,marginBottom:6}},"Aucun post pour l'instant"),
              h("div",{style:{fontSize:14,color:"var(--text2)"}},"Clique sur ＋ pour publier le premier !")
            )
          :visiblePosts.map(p=>h(PostCard,{key:p.id,post:p,myUid,gps,cats:myCats,users,onAuthor:uid=>push({id:"profile",uk:uid}),onEdit:(id,txt)=>patchPost(id,{text:txt}),onDelete:id=>rmPost(id),onViewPhoto:p=>push({id:"photo",post:p})}))
      ),

      cur.id==="search"&&h(SearchScreen,{users,myUid,onGoProfile:uid=>push({id:"profile",uk:uid})}),
      cur.id==="profile"&&h(ProfileScreen,{uid:cur.uk||myUid,myUid,users,posts:visiblePosts,gps,cats:myCats,onBack:pop,onGoProfile:uid=>push({id:"profile",uk:uid}),onEditAccess:id=>push(id==="__cats__"?{id:"cats"}:{id:"access",catId:id}),onViewPhoto:p=>push({id:"photo",post:p})}),
      cur.id==="publish"&&h(PublishScreen,{myUid,gps,cats:myCats,onBack:pop}),
      cur.id==="photo"&&h(PhotoScreen,{post:cur.post,myUid,gps,users,onBack:pop}),
      cur.id==="cats"&&h(CatsScreen,{myUid,cats:myCats,onBack:pop,onEditAccess:id=>push({id:"access",catId:id})}),
      cur.id==="access"&&myCats.find(c=>c.id===cur.catId)&&h(AccessScreen,{cat:myCats.find(c=>c.id===cur.catId),myUid,users,onBack:pop})
    ),

    !isMapFull&&!isPublish&&h(TabBar),
    !isMapFull&&!isPublish&&showFAB&&h("div",{style:{position:"fixed",bottom:96,right:20,zIndex:49,maxWidth:460}},
      h("button",{onClick:()=>push({id:"publish"}),style:{width:54,height:54,borderRadius:"50%",background:"var(--green)",color:"#fff",border:"none",cursor:"pointer",fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(29,158,117,0.4)"}},"＋")
    )
  );
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>
</body>
</html>
