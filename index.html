// ── Utilitaires ──────────────────────────────────────────
function haversine(la1,lo1,la2,lo2){
  const R=6371000,d1=(la2-la1)*Math.PI/180,d2=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(d1/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(d2/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const fmtD=m=>m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(1)} km`;
const fmtDate=ts=>new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});

function uidHue(uid){
  const hs=["#D85A30","#7F77DD","#378ADD","#D4537E","#BA7517","#1D9E75","#5DCAA5","#993C1D"];
  const n=uid.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  return hs[n%hs.length];
}

function compressImg(file){
  return new Promise(ok=>{
    const r=new FileReader();
    r.onload=e=>{
      const i=new Image();
      i.onload=()=>{
        const MAX=520,sc=Math.min(1,MAX/Math.max(i.width,i.height));
        const c=document.createElement('canvas');
        c.width=Math.round(i.width*sc);c.height=Math.round(i.height*sc);
        c.getContext('2d').drawImage(i,0,0,c.width,c.height);
        ok(c.toDataURL('image/jpeg',0.55));
      };
      i.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// Vérifie si uid peut voir le post p selon la distance ET l'accès catégorie
const canSeeAccess=(p,viewerUid,allUsers,allCats)=>{
  if(p.uid===viewerUid)return true; // toujours voir ses propres posts
  const authorCats=allCats?.[p.uid]||{};
  const cat=p.cat?authorCats[p.cat]:null;
  const access=cat?.access||"public";
  if(access==="private")return false;
  if(access==="public"){
    // public = tous les abonnés de l'auteur (ceux qui suivent l'auteur)
    const viewerFollowing=allUsers?.[viewerUid]?.following||{};
    return !!viewerFollowing[p.uid];
  }
  // custom = seulement les uids listés dans access.custom
  if(typeof access==="object"&&access.custom){
    return !!access.custom[viewerUid];
  }
  return false;
};
const canSee=(p,uid,gps)=>p.uid===uid||(gps&&haversine(gps.lat,gps.lng,p.lat,p.lng)<=p.radius);
const aLbl=a=>a==="public"?{icon:"🌍",label:"Tout le monde",c:"#1D9E75",bg:"#E1F5EE"}:a==="private"?{icon:"🔒",label:"Moi seul",c:"#888",bg:"#f1efe8"}:{icon:"👥",label:`${Object.keys((a&&a.custom)||{}).length} abonné(s)`,c:"#378ADD",bg:"#E6F1FB"};

// ── CARTE LEAFLET ────────────────────────────────────────
function ZoneMap({posts,gps,myUid,users,onSelectPost,selectedPostId,onMapReady}){
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const markersRef=useRef({});
  const circlesRef=useRef({});
  const myMarkerRef=useRef(null);
  const centeredRef=useRef(false);

  // Init carte
  useEffect(()=>{
    if(!mapRef.current||leafRef.current)return;
    const center=gps?[gps.lat,gps.lng]:[48.8566,2.3522];
    const map=L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView(center,14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
    L.control.zoom({position:'bottomleft'}).addTo(map);
    leafRef.current=map;
    if(gps)centeredRef.current=true;
    if(onMapReady)onMapReady(map);
    return()=>{map.remove();leafRef.current=null;centeredRef.current=false;};
  },[]);

  // Centrage GPS unique
  useEffect(()=>{
    if(!leafRef.current||!gps||centeredRef.current)return;
    leafRef.current.setView([gps.lat,gps.lng],15,{animate:true});
    centeredRef.current=true;
  },[gps?.lat,gps?.lng]);

  // Marqueur ma position
  useEffect(()=>{
    if(!leafRef.current||!gps)return;
    if(myMarkerRef.current){myMarkerRef.current.setLatLng([gps.lat,gps.lng]);return;}
    const icon=L.divIcon({className:'',html:`<svg width="28" height="38" viewBox="0 0 28 38"><path d="M14 37C14 37 1 23 1 13A13 13 0 1 1 27 13C27 23 14 37 14 37Z" fill="#1D9E75" stroke="white" stroke-width="2"/><circle cx="14" cy="12" r="5" fill="white"/></svg>`,iconSize:[28,38],iconAnchor:[14,38]});
    myMarkerRef.current=L.marker([gps.lat,gps.lng],{icon,zIndexOffset:1000,interactive:false}).addTo(leafRef.current);
  },[gps?.lat,gps?.lng]);

  // Marqueurs posts
  useEffect(()=>{
    if(!leafRef.current)return;
    Object.values(markersRef.current).forEach(m=>m.remove());
    Object.values(circlesRef.current).forEach(c=>c.remove());
    markersRef.current={};circlesRef.current={};
    posts.forEach(p=>{
      if(!p.lat||!p.lng)return;
      const hue=uidHue(p.uid);
      const ul=canSee(p,myUid,gps);
      const isSelected=p.id===selectedPostId;
      const alpha=selectedPostId&&!isSelected?0.5:1;
      const circleColor=isSelected?"#1D9E75":hue;
      const circle=L.circle([p.lat,p.lng],{
        radius:p.radius,color:circleColor,weight:isSelected?2.5:1.5,
        fillColor:circleColor,fillOpacity:(ul?0.12:0.04)*alpha,
        dashArray:ul?null:'6 4',opacity:alpha
      }).addTo(leafRef.current);
      circlesRef.current[p.id]=circle;
      const dotColor=isSelected?"#1D9E75":hue;
      const dotSize=isSelected?18:14;
      const dot=L.divIcon({className:'',html:`<svg width="${dotSize}" height="${dotSize}" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="${dotColor}" stroke="white" stroke-width="2" opacity="${alpha}"/></svg>`,iconSize:[dotSize,dotSize],iconAnchor:[dotSize/2,dotSize/2]});
      const marker=L.marker([p.lat,p.lng],{icon:dot,zIndexOffset:isSelected?500:0}).addTo(leafRef.current);
      marker.on('click',()=>onSelectPost&&onSelectPost(p));
      markersRef.current[p.id]=marker;
    });
  },[posts.map(p=>p.id).join(','),selectedPostId,gps?.lat,gps?.lng]);

  return h("div",{ref:mapRef,style:{width:"100%",height:"100%"}});
}

function ProfileSetup({uid,onDone}){

  const [photo,setPhoto]=useState(null);

    if(!ok||saving)return;
    setSaving(true);

function GpsScreen({onDone}){
  const [status,setStatus]=useState("idle"); // idle | requesting | success | denied | timeout | unavailable
  const [errorCode,setErrorCode]=useState(null);

  const request=()=>{
    if(!navigator.geolocation){setStatus("unavailable");return;}
    setStatus("requesting");
    navigator.geolocation.getCurrentPosition(
      pos=>{setStatus("success");setTimeout(()=>onDone(pos),600);},
      err=>{
        setErrorCode(err.code);
        // code 1 = PERMISSION_DENIED, 2 = POSITION_UNAVAILABLE, 3 = TIMEOUT
        setStatus(err.code===1?"denied":err.code===3?"timeout":"unavailable");
      },
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  };

  // Essai auto au montage si permission déjà accordée
  useEffect(()=>{
    if(navigator.permissions){
      navigator.permissions.query({name:"geolocation"}).then(r=>{
        if(r.state==="granted")request();
      }).catch(()=>{}); // pas supporté sur tous les navigateurs
    }
  },[]);

  const statusInfo={
    idle:{icon:"📍",color:"var(--green)",title:"Localisation requise",sub:"ZONE utilise ta position pour afficher les posts autour de toi et ancrer tes publications."},
    requesting:{icon:"⏳",color:"var(--text2)",title:"Récupération en cours…",sub:"Recherche de ta position GPS. Cela peut prendre quelques secondes."},
    success:{icon:"✅",color:"var(--green)",title:"Position trouvée !",sub:"Tu vas être redirigé vers l'app…"},
    denied:{icon:"🚫",color:"var(--red)",title:"Accès refusé",sub:"Tu as refusé la localisation. Pour l'activer : Réglages → Safari (ou Chrome) → Localisation → Autoriser."},
    timeout:{icon:"⏱",color:"#BA7517",title:"Signal GPS faible",sub:"Impossible d'obtenir ta position. Essaie à l'extérieur ou vérifie que le GPS est activé dans les réglages de ton téléphone."},

    // Exactement comme ZoneMap : zoomControl:false puis L.control.zoom() séparé
    const map=L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView([gps.lat,gps.lng],zoom);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
    L.control.zoom({position:'bottomleft'}).addTo(map);
    const icon=L.divIcon({className:'',html:'<svg width="20" height="26" viewBox="0 0 20 26"><path d="M10 26C10 26 1 16 1 9A9 9 0 1 1 19 9C19 16 10 26 10 26Z" fill="#1D9E75" stroke="white" stroke-width="1.5"/><circle cx="10" cy="9" r="3.5" fill="white"/></svg>',iconSize:[20,26],iconAnchor:[10,26]});
    L.marker([gps.lat,gps.lng],{icon,interactive:false}).addTo(map);
    circleRef.current=L.circle([gps.lat,gps.lng],{radius,color:"#1D9E75",weight:2,fillColor:"#1D9E75",fillOpacity:0.13}).addTo(map);
    leafRef.current=map;
    if(onMapReady)onMapReady(map);
    return()=>{map.remove();leafRef.current=null;circleRef.current=null;};
  },[gps?.lat,gps?.lng]);

  // Zoom pour voir tout le cercle quand radius change
  useEffect(()=>{
    if(!leafRef.current||!circleRef.current||!gps)return;
    circleRef.current.setRadius(radius);
    const zoom=radius<150?17:radius<400?16:radius<1000?15:radius<2500?14:13;
    leafRef.current.setView([gps.lat,gps.lng],zoom,{animate:false});
  },[radius]);

  if(!gps)return h("div",{style:{height,borderRadius:"var(--rl)",background:"var(--bg2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"var(--text3)"}},"GPS requis");
  return h("div",{ref:mapRef,style:{height,borderRadius:"var(--rl)",overflow:"hidden",border:"0.5px solid var(--border)"}});
}


// ── EXIF GPS MANUEL ───────────────────────────────────────
function readExifGpsManual(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const buf=e.target.result;
        const view=new DataView(buf);
        // Vérifie que c'est bien un JPEG
        if(view.getUint16(0)!==0xFFD8){resolve(null);return;}
        let offset=2;
        while(offset<buf.byteLength-2){
          const marker=view.getUint16(offset);
          offset+=2;
          if(marker===0xFFE1){// APP1 = EXIF
            const len=view.getUint16(offset);
            const exifStr=String.fromCharCode(...new Uint8Array(buf,offset+2,4));
            if(exifStr==="Exif"){
              const tiffStart=offset+8;
              const endian=view.getUint16(tiffStart);
              const le=endian===0x4949;
              const getU16=(o)=>view.getUint16(tiffStart+o,le);
              const getU32=(o)=>view.getUint32(tiffStart+o,le);
              // IFD0
              const ifd0=getU32(4);
              const ifd0Count=getU16(ifd0);
              let gpsOffset=null;
              for(let i=0;i<ifd0Count;i++){
                const tag=getU16(ifd0+2+i*12);
                if(tag===0x8825){gpsOffset=getU32(ifd0+2+i*12+8);break;}
              }
              if(gpsOffset!==null){
                const gpsCount=getU16(gpsOffset);
                let lat=null,lng=null,latRef="N",lngRef="E";
                for(let i=0;i<gpsCount;i++){
                  const tag=getU16(gpsOffset+2+i*12);
                  const valOff=getU32(gpsOffset+2+i*12+8);
                  if(tag===1) latRef=String.fromCharCode(view.getUint8(tiffStart+valOff));
                  if(tag===3) lngRef=String.fromCharCode(view.getUint8(tiffStart+valOff));
                  if(tag===2||tag===4){
                    const toD=(off)=>{
                      const d=getU32(off)/getU32(off+4);
                      const m=getU32(off+8)/getU32(off+12);
                      const s=getU32(off+16)/getU32(off+20);
                      return d+m/60+s/3600;
                    };
                    if(tag===2) lat=toD(tiffStart+valOff);
                    if(tag===4) lng=toD(tiffStart+valOff);
                  }
                }
                if(lat!==null&&lng!==null){
                  resolve({lat:latRef==="S"?-lat:lat,lng:lngRef==="W"?-lng:lng});
                  return;
                }
              }
            }
            offset+=len;
          } else if((marker&0xFF00)===0xFF00){
            offset+=view.getUint16(offset);
          } else break;
        }
        resolve(null);
      }catch(e){resolve(null);}
    };
    reader.onerror=()=>resolve(null);
    reader.readAsArrayBuffer(file);
  });
}

// ── PUBLICATION ───────────────────────────────────────────
function PublishScreen({myUid,gps,cats,onBack}){
  const [step,setStep]=useState("form"); // form | crop | zone
  const [rawPhoto,setRawPhoto]=useState(null);
  const [photo,setPhoto]=useState(null);
  const [photoGps,setPhotoGps]=useState(null);
  const [txt,setTxt]=useState("");
  const [rad,setRad]=useState(300);
  const [zoneConfirmed,setZoneConfirmed]=useState(false);
  const [sel,setSel]=useState(null);
  const [saving,setSaving]=useState(false);
  const fileRef=useRef(null);
  const sC=cats.find(c=>c.id===sel);
  const lb=sC?aLbl(sC.access):null;
  const postGps=photoGps||gps;
  const fR=m=>m>=1000?`${(m/1000).toFixed(1)} km`:`${m} m`;
  // Peut aller à l'étape zone : faut au moins une photo OU du texte + GPS
  const canGoZone=!!(txt.trim()||photo)&&!!postGps;
  // Peut publier : contenu + GPS + zone confirmée
  const canPost=canGoZone&&zoneConfirmed;

  const handleFile=async f=>{
    if(!f||!f.type.startsWith("image/"))return;
    let exifGps=null;
    try{
      if(window.Exifr){try{const r=await window.Exifr.gps(f);if(r?.latitude&&r?.longitude)exifGps={lat:r.latitude,lng:r.longitude};}catch(e){}}
      if(!exifGps)exifGps=await readExifGpsManual(f);
    }catch(e){}
    setPhotoGps(exifGps);
    const r=new FileReader();
    r.onload=e=>{setRawPhoto(e.target.result);setStep("crop");};
    r.readAsDataURL(f);
  };

  const doPost=async()=>{
    if(!canPost||saving)return;
    setSaving(true);
    let finalPhoto=photo;
    if(photo){
      const compressed=await new Promise(ok=>{const i=new Image();i.onload=()=>{const MAX=800,sc=Math.min(1,MAX/Math.max(i.width,i.height));const c=document.createElement('canvas');c.width=Math.round(i.width*sc);c.height=Math.round(i.height*sc);c.getContext('2d').drawImage(i,0,0,c.width,c.height);ok(c.toDataURL('image/jpeg',0.6));};i.src=photo;});
      finalPhoto=compressed;
    }
    await pushPost(myUid,{text:txt.trim(),photo:finalPhoto||null,lat:postGps.lat,lng:postGps.lng,radius:rad,cat:sel,uid:myUid});
    setSaving(false);onBack();
  };

  const BackBtn=({onClick})=>h("button",{onClick,style:{width:40,height:40,borderRadius:12,background:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"var(--shadow)",flexShrink:0}},

  // ── ÉTAPE 2 : ZONE ──
  if(step==="zone") return h("div",{style:{minHeight:"100vh",background:"var(--bg3)"}},
    h("div",{style:{background:"rgba(255,255,255,0.97)",borderBottom:"0.5px solid var(--border)",padding:"52px 16px 14px",display:"flex",alignItems:"center",gap:14}},

      h("span",{style:{fontSize:17,fontWeight:700,flex:1}},"Définir la zone"),

          h("span",{style:{color:"var(--green)"}},fR(rad))

        h("input",{type:"range",min:50,max:5000,step:50,value:rad,

  return h("div",{style:{minHeight:"100vh",background:"var(--bg3)",display:"flex",flexDirection:"column"}},

    h("div",{style:{position:"sticky",top:0,zIndex:10,background:"rgba(255,255,255,0.96)",backdropFilter:"blur(12px)",borderBottom:"0.5px solid var(--border)",padding:"0 16px"}},

        h(BackBtn,{onClick:onBack}),

              h("button",{onClick:()=>{setPhoto(null);setRawPhoto(null);setPhotoGps(null);},style:{width:32,height:32,background:"rgba(0,0,0,0.55)",border:"none",borderRadius:"50%",cursor:"pointer",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}},"×")

// ── RECHERCHE ─────────────────────────────────────────────
function SearchScreen({users,myUid,onGoProfile}){
  const [q,setQ]=useState("");
  const res=useMemo(()=>{
    const entries=Object.entries(users).filter(([uid,u])=>uid!==myUid&&u?.pseudo);
    if(!q.trim()) return entries.slice(0,8); // show suggestions when empty
    const s=q.toLowerCase().trim();
    return entries
      .map(([uid,u])=>{
        const pseudo=(u.pseudo||"").toLowerCase();
        const bio=(u.bio||"").toLowerCase();
        const ville=(u.ville||"").toLowerCase();
        // score: starts-with = best, contains = ok
        let score=0;
        if(pseudo===s)score=100;
        else if(pseudo.startsWith(s))score=80;
        else if(pseudo.includes(s))score=60;
        else if(bio.includes(s)||ville.includes(s))score=20;
        return{uid,u,score};
      })
      .filter(x=>x.score>0)
      .sort((a,b)=>b.score-a.score)
      .map(({uid,u})=>[uid,u]);
  },[q,users,myUid]);

  return h("div",{style:{paddingBottom:100}},
    // Header
    h("div",{style:{padding:"20px 16px 12px",display:"flex",alignItems:"center",gap:12}},
      h("div",{style:{flex:1,position:"relative"}},
        h("div",{style:{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}},
          h("svg",{width:16,height:16,viewBox:"0 0 24 24",fill:"none",stroke:"var(--text3)",strokeWidth:2.5},h("circle",{cx:11,cy:11,r:8}),h("path",{d:"m21 21-4.35-4.35"}))
        ),
        h("input",{value:q,onChange:e=>setQ(e.target.value),placeholder:"Chercher un profil…",autoFocus:true,style:{width:"100%",padding:"12px 14px 12px 42px",fontSize:14,border:"none",borderRadius:"var(--rxl)",background:"#fff",color:"var(--text)",boxSizing:"border-box",boxShadow:"var(--shadow)"}}),
        q&&h("button",{onClick:()=>setQ(""),style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"var(--bg2)",border:"none",cursor:"pointer",width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"var(--text3)"}},"×")
      )
    ),
    // Empty state
    !q.trim()&&h("div",{style:{margin:"12px 16px 0",background:"#fff",borderRadius:"var(--rl)",padding:"40px 24px",textAlign:"center",boxShadow:"var(--shadow)"}},
      h("div",{style:{width:64,height:64,borderRadius:"50%",background:"var(--pbg)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}},
        h("svg",{width:28,height:28,viewBox:"0 0 24 24",fill:"none",stroke:"var(--purple)",strokeWidth:2},h("circle",{cx:11,cy:11,r:8}),h("path",{d:"m21 21-4.35-4.35"}))
      ),
      h("div",{style:{fontSize:17,fontWeight:700,marginBottom:6}},"Recherche de profils"),
      h("div",{style:{fontSize:14,color:"var(--text2)"}},"Tape un nom pour trouver quelqu'un")
    ),
    // No results
    q.trim()&&res.length===0&&h("div",{style:{margin:"12px 16px 0",background:"#fff",borderRadius:"var(--rl)",padding:"32px 24px",textAlign:"center",boxShadow:"var(--shadow)"}},
      h("div",{style:{fontSize:14,color:"var(--text2)"}},"Aucun résultat pour \"",h("strong",null,q),"\"")
    ),
    // Results
    res.length>0&&h("div",{style:{padding:"0 16px",display:"flex",flexDirection:"column",gap:8}},
      res.map(([uid,u])=>h("div",{key:uid,onClick:()=>onGoProfile(uid),style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"#fff",borderRadius:"var(--rl)",cursor:"pointer",boxShadow:"var(--shadow)"}},
        h(Av,{photo:u.photo,pseudo:u.pseudo,sz:46,hue:uidHue(uid)}),
        h("div",{style:{flex:1,minWidth:0}},
          h("div",{style:{fontSize:15,fontWeight:600,color:"var(--text)"}},u.pseudo),
          u.bio&&h("div",{style:{fontSize:13,color:"var(--text2)",marginTop:2}},u.bio),
          u.ville&&h("div",{style:{fontSize:12,color:"var(--text3)",marginTop:2}},
            h("span",{style:{marginRight:4}},"📍"),u.ville
          )
        ),
        h("svg",{width:16,height:16,viewBox:"0 0 24 24",fill:"none",stroke:"var(--text3)",strokeWidth:2},h("polyline",{points:"9 18 15 12 9 6"}))
      ))
    )
  );
}

// ── DAILY CHALLENGE + STREAK ──────────────────────────────
// Génère une heure aléatoire reproductible pour un jour donné
function getDailyTime(dateStr){
  let h=0;for(const c of dateStr)h=(h*31+c.charCodeAt(0))%86400;
  const base=8*3600;const range=14*3600; // entre 8h et 22h
  return base+(h%range);
}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function nowSecs(){return Math.floor(Date.now()/1000)%86400;}

function DailyBanner({myUid,gps,onPost,streak}){
  const [secsLeft,setSecsLeft]=useState(null);
  const [dismissed,setDismissed]=useState(false);
  const day=todayStr();
  const challengeTime=getDailyTime(day);
  const WINDOW=300; // 5 minutes

  useEffect(()=>{
    const tick=()=>{
      const now=nowSecs();
      const diff=now-challengeTime;
      if(diff>=0&&diff<WINDOW)setSecsLeft(WINDOW-diff);
      else setSecsLeft(null);
    };
    tick();
    const iv=setInterval(tick,1000);
    return()=>clearInterval(iv);
  },[]);

  if(secsLeft===null||dismissed)return null;
  const mins=Math.floor(secsLeft/60);const secs=secsLeft%60;

  return h("div",{style:{position:"fixed",top:8,left:8,right:8,maxWidth:444,margin:"0 auto",zIndex:200}},
    h("div",{style:{background:"linear-gradient(90deg,#1D9E75,#0d7a5c)",padding:"11px 14px",display:"flex",alignItems:"center",gap:10,borderRadius:16,boxShadow:"0 4px 20px rgba(29,158,117,0.38)"}},
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:13,fontWeight:700,color:"#fff"}},"📸 Zone Moment !"),
        h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.85)",marginTop:2}},`Poste dans ${mins}:${String(secs).padStart(2,'0')} pour garder ta streak 🔥`)
      ),
      streak>0&&h("div",{style:{fontSize:11,color:"#fff",fontWeight:600,background:"rgba(255,255,255,0.18)",padding:"3px 8px",borderRadius:10}},`🔥 ${streak}`),
      h("button",{onClick:()=>onPost(),style:{padding:"6px 12px",background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:10,fontSize:11,fontWeight:700,color:"#fff",cursor:"pointer",backdropFilter:"blur(4px)"}},"Poster →"),
      h("button",{onClick:()=>setDismissed(true),style:{width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.15)",border:"none",color:"rgba(255,255,255,0.85)",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}},"×")
    )
  );
}

// Vérifie et met à jour le streak après un post
async function checkAndUpdateStreak(myUid){
  const day=todayStr();
  const challengeTime=getDailyTime(day);
  const now=nowSecs();
  if(now-challengeTime<0||now-challengeTime>=300)return; // hors fenêtre
  const ref=db.ref(`users/${myUid}/streak`);
  const snap=await ref.once('value');
  const s=snap.val()||{count:0,lastDay:""};
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=`${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
  const newCount=s.lastDay===yStr?s.count+1:s.lastDay===day?s.count:1;
  await ref.set({count:newCount,lastDay:day});
}

// ── APP PRINCIPALE ────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("loading"); // loading | welcome | google | setup | gps | app
  const [authUser,setAuthUser]=useState(null);
  const [users,setUsers]=useState({});
  const [posts,setPosts]=useState([]);
  const [myCats,setMyCats]=useState([]);
  const [allCats,setAllCats]=useState({});
  const [gps,setGps]=useState(null);
  const [stack,setStack]=useState([{id:"map"}]);
  const [signLoading,setSignLoading]=useState(false);
  const [signError,setSignError]=useState(false);

  const push=s=>setStack(p=>[...p,s]);
  const pop=()=>setStack(p=>p.length>1?p.slice(0,-1):p);
  const goRoot=id=>setStack([{id}]);
  const cur=stack[stack.length-1];
  const isRoot=stack.length===1;
  const activeTab=isRoot?cur.id:null;

  // Auth listener
  useEffect(()=>{
    return auth.onAuthStateChanged(async user=>{
      if(!user){setAuthUser(null);setPhase("welcome");return;}
      setAuthUser(user);
      const snap=await db.ref('users/'+user.uid).once('value');
      if(!snap.exists()){setPhase("setup");return;}
      setPhase("gps");
    });
  },[]);

  // DB listeners
  useEffect(()=>{
    if(!authUser)return;
    const pRef=db.ref('posts');
    const uRef=db.ref('users');
    // categories/uid : mes cats (règles Firebase = own only en écriture, auth en lecture par uid)
    const cRef=db.ref('categories/'+authUser.uid);
    // allCatsRef : on écoute chaque auteur de post séparément via posts listener
    const onP=snap=>{
      const d=snap.val()||{};
      const arr=Object.entries(d).map(([id,v])=>({id,...v})).sort((a,b)=>b.ts-a.ts);
      setPosts(arr);
      // Charger les cats de tous les auteurs des posts
      const uids=[...new Set(arr.map(p=>p.uid).filter(u=>u!==authUser.uid))];
      uids.forEach(uid=>{
        db.ref('categories/'+uid).once('value').then(snap=>{
          const d=snap.val()||{};
          setAllCats(prev=>({...prev,[uid]:d}));
        }).catch(()=>{});
      });
    };
    const onU=snap=>setUsers(snap.val()||{});
    const onC=snap=>{
      const d=snap.val()||{};
      setMyCats(Object.entries(d).map(([id,v])=>({id,...v})));
      setAllCats(prev=>({...prev,[authUser.uid]:d}));
    };
    pRef.on('value',onP);uRef.on('value',onU);cRef.on('value',onC);
    return()=>{pRef.off('value',onP);uRef.off('value',onU);cRef.off('value',onC);};
  },[authUser]);

  const [gpsError,setGpsError]=useState(null); // null | "denied" | "timeout" | "unavailable"

  // GPS
  useEffect(()=>{
    if(phase!=="app"&&phase!=="gps")return;
    if(!navigator.geolocation){setGpsError("unavailable");if(phase==="gps")setPhase("app");return;}
    const wid=navigator.geolocation.watchPosition(
      pos=>{
        setGps({lat:pos.coords.latitude,lng:pos.coords.longitude});
        setGpsError(null);
        if(phase==="gps")setPhase("app");
      },
      err=>{
        const type=err.code===1?"denied":err.code===3?"timeout":"unavailable";
        setGpsError(type);
        if(phase==="gps")setPhase("app");
      },
      {enableHighAccuracy:true,maximumAge:10000,timeout:20000}
    );
    return()=>navigator.geolocation.clearWatch(wid);
  },[phase]);

  // Bottom sheet + filter state — MUST be before conditional returns (Rules of Hooks)
  const [sheetOpen,setSheetOpen]=useState("md");
  const [selectedPost,setSelectedPost]=useState(null);
  const [dateFilter,setDateFilter]=useState("all");
  const [hiddenAuthors,setHiddenAuthors]=useState(new Set());
  const [showFilter,setShowFilter]=useState(false);
  const leafMapRef=useRef(null);

  const signIn=async()=>{
    setSignLoading(true);setSignError(false);
    try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
    catch(e){setSignError(true);setSignLoading(false);}
  };

  // ── Phases pré-app ──
  if(phase==="loading") return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#fff"}},
    h("div",{style:{textAlign:"center"}},
      h("div",{style:{width:56,height:56,borderRadius:14,background:"#1D9E75",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}},h("span",{style:{fontSize:24,color:"#fff",fontWeight:600}},"Z")),
      h("div",{style:{fontSize:13,color:"var(--text3)"}},"Chargement…")
    )
  );
  if(phase==="welcome") return h(Welcome,{onStart:()=>setPhase("google")});
  if(phase==="google") return h(GoogleSignIn,{onSign:signIn,loading:signLoading,error:signError});
  if(phase==="setup") return h(ProfileSetup,{uid:authUser.uid,onDone:()=>setPhase("gps")});
  if(phase==="gps") return h(GpsScreen,{onDone:(pos)=>{if(pos)setGps({lat:pos.coords.latitude,lng:pos.coords.longitude});setPhase("app");}});

  // ── App principale ──
  const myUid=authUser.uid;
  const myBlocked=Object.keys(users[myUid]?.blocked||{});
  const visiblePosts=posts.filter(p=>{
    if(myBlocked.includes(p.uid))return false;
    if(p.uid===myUid)return true;
    // Vérifier l'accès catégorie
    return canSeeAccess(p,myUid,users,allCats);
  });
  const slideClass=stack.length>1?"s-in":"s-back";
  const isPublish=cur.id==="publish";
  const isProfile=cur.id==="profile";
  const isMapRoot=cur.id==="map"&&isRoot;

  // Tab bar 2 onglets + pill Publier centrale

      // Onglet Carte
      h("button",{onClick:()=>goRoot("map"),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 4px",border:"none",background:"transparent",cursor:"pointer"}},
        h("div",{style:{width:36,height:30,borderRadius:10,background:isRoot&&cur.id==="map"?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}},
          h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:isRoot&&cur.id==="map"?"#fff":"var(--text3)",strokeWidth:2},h("polygon",{points:"1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"}),h("line",{x1:8,y1:2,x2:8,y2:18}),h("line",{x1:16,y1:6,x2:16,y2:22}))
        ),
        h("span",{style:{fontSize:9,fontWeight:isRoot&&cur.id==="map"?700:400,color:isRoot&&cur.id==="map"?"var(--green)":"var(--text3)"}},"Carte")
      ),
      // Pill Publier centrale
      h("button",{onClick:()=>push({id:"publish"}),style:{flexShrink:0,display:"flex",alignItems:"center",gap:6,padding:"10px 18px",background:"var(--green)",border:"none",borderRadius:18,cursor:"pointer",boxShadow:"0 4px 16px rgba(29,158,117,0.38)",position:"relative",overflow:"hidden"}},

        h("svg",{width:13,height:13,viewBox:"0 0 14 14",fill:"none",style:{position:"relative",zIndex:1}},h("path",{d:"M7 2v10M2 7h10",stroke:"#fff",strokeWidth:2,strokeLinecap:"round"})),
        h("span",{style:{fontSize:12,fontWeight:800,color:"#fff",letterSpacing:"-0.01em",position:"relative",zIndex:1}},"Publier")
      ),
      // Onglet Recherche
      h("button",{onClick:()=>goRoot("search"),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 4px",border:"none",background:"transparent",cursor:"pointer"}},
        h("div",{style:{width:36,height:30,borderRadius:10,background:isRoot&&cur.id==="search"?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}},
          h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:isRoot&&cur.id==="search"?"#fff":"var(--text3)",strokeWidth:2},h("circle",{cx:11,cy:11,r:8}),h("path",{d:"m21 21-4.35-4.35"}))
        ),
        h("span",{style:{fontSize:9,fontWeight:isRoot&&cur.id==="search"?700:400,color:isRoot&&cur.id==="search"?"var(--green)":"var(--text3)"}},"Recherche")
      )
    )
  );

  // État bottom sheet (hooks already declared above)
  const myUser=users[myUid]||{};

  // Filtrage posts pour la carte
  const now2=Date.now();
  const filteredPosts=visiblePosts
    .filter(p=>dateFilter==="all"||(dateFilter==="today"&&now2-p.ts<86400000)||(dateFilter==="week"&&now2-p.ts<604800000))
    .filter(p=>!hiddenAuthors.has(p.uid));
  const authorIds=[...new Set(visiblePosts.map(p=>p.uid))];

  const handleSelectPost=(p)=>{
    setSelectedPost(p);
    setSheetOpen("md");
    if(leafMapRef.current&&p.lat&&p.lng){
      leafMapRef.current.flyTo([p.lat,p.lng],16,{duration:0.6});
    }
  };

  const handleDeselectPost=()=>{
    setSelectedPost(null);
  };

  // Écran carte+sheet (render function, NOT a component — avoids remounting Leaflet on every re-render)
  const renderMapScreen=()=>{
    const SHEET_PEEK_MD=170; // réduit — strip visible
    const SHEET_FULL=Math.round(window.innerHeight*0.58);
    const sheetH=sheetOpen==="full"?SHEET_FULL:SHEET_PEEK_MD;
    const TAB_H=90; // hauteur tab bar + marge

    return h("div",{style:{position:"fixed",inset:0,zIndex:5,maxWidth:460,margin:"0 auto",width:"100%"}},

        h("div",{style:{fontSize:12,fontWeight:600,color:"var(--text)",marginBottom:8,display:"flex",justifyContent:"space-between"}},

        ),
        authorIds.map(uid=>{const u=users[uid];const shown=!hiddenAuthors.has(uid);const hue=uidHue(uid);
          return h("div",{key:uid,onClick:()=>setHiddenAuthors(s=>{const n=new Set(s);n.has(uid)?n.delete(uid):n.add(uid);return n;}),style:{display:"flex",alignItems:"center",gap:8,padding:"5px 0",cursor:"pointer"}},
            h("div",{style:{width:10,height:10,borderRadius:"50%",flexShrink:0,background:shown?hue:"var(--border2)",border:`1.5px solid ${hue}`}}),
            h("span",{style:{fontSize:12,flex:1,color:shown?"var(--text)":"var(--text3)"}},u?.pseudo||uid.slice(0,8)),
            h("span",{style:{fontSize:11,color:"var(--text3)"}},visiblePosts.filter(p=>p.uid===uid).length)
          );
        })
      ),

      // Bottom sheet — pill flottante, arrondie des 4 côtés
      h("div",{style:{
        position:"absolute",bottom:TAB_H,left:8,right:8,zIndex:20,
        height:sheetH,
        background:"rgba(255,255,255,0.97)",
        backdropFilter:"blur(16px)",
        WebkitBackdropFilter:"blur(16px)",
        borderRadius:20,
        boxShadow:"0 -2px 24px rgba(0,0,0,0.09),0 4px 12px rgba(0,0,0,0.04)",

                  h("div",{style:{padding:"6px 8px"}},
                    h("div",{style:{display:"flex",alignItems:"center",gap:5,marginBottom:2}},

      cur.id==="access"&&myCats.find(c=>c.id===cur.catId)&&h(AccessScreen,{cat:myCats.find(c=>c.id===cur.catId),myUid,users,onBack:pop})

    !isMapRoot&&!isPublish&&!isProfile&&h(TabBar)
  );
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>
